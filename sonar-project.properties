# SonarQube configuration for CI/CD project
sonar.projectName=Complete CI/CD Project
sonar.projectDescription=Multi-service microservices project with CI/CD pipeline

# Language
sonar.language=py
sonar.sourceEncoding=UTF-8

# Python version
sonar.python.version=3.11

# Exclusions
sonar.exclusions=**/node_modules/**,**/venv/**,**/env/**,**/__pycache__/**

# Test exclusions
sonar.test.exclusions=**/tests/**

# Coverage reports
sonar.python.coverage.reportPaths=**/coverage.xml

# Additional analysis
sonar.sources=.
