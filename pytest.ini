[pytest]
# Pytest configuration for project-wide test discovery and execution

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Ensure proper imports and module discovery
pythonpath = .

# Minimum Python version
minversion = 7.0

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Define custom markers
markers =
    unit: Unit tests
    integration: Integration tests
    health: Health check tests
    slow: Slow running tests
