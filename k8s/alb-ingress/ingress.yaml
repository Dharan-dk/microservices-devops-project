apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudmart-ingress
  namespace: cloudmart
  annotations:
    # ALB faces the internet
    alb.ingress.kubernetes.io/scheme: internet-facing

    # Route traffic to pod IP directly (bypasses kube-proxy)
    alb.ingress.kubernetes.io/target-type: ip

    # ALB listens on port 80
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Health check path used by ALB target groups (each service must expose /health)
    alb.ingress.kubernetes.io/healthcheck-path: /health

    # Tag the ALB for easy identification in AWS Console
    alb.ingress.kubernetes.io/tags: Project=cloudmart,Environment=dev

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Root path and docs - route to order-service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80

          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80

          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80

          - path: /openapi.json
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80

          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80

          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80