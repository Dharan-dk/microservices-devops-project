apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: cloudmart
  labels:
    app: order-service
spec:
  # ClusterIP: internal only — ALB routes to pods directly via target-type: ip
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000