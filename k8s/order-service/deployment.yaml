# ── Order Service Deployment ─────────────────────────────────────────────
# Manages order-service pods with rolling updates and resource limits
# Health checks ensure only healthy pods receive traffic

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: cloudmart
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service

  # ── Rolling Update Strategy ──────────────────────────────────────────
  # maxUnavailable: 1 pod can be down during update (maintains HA)
  # maxSurge: 1 extra pod created during update (quick rollout)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          # envsubst replaces these at deploy time in Jenkinsfile
          image: ${ECR_REGISTRY}/cloudmart-order-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # ── Resource requests/limits ──────────────────────────
          # requests: guaranteed resources (used by HPA for scaling decisions)
          # limits:   hard cap (pod killed if exceeded)
          resources:
            requests:
              cpu: "250m"       # 0.25 vCPU guaranteed
              memory: "256Mi"   # 256MB guaranteed
            limits:
              cpu: "500m"       # 0.5 vCPU max
              memory: "512Mi"   # 512MB max

          # ── Health probes ─────────────────────────────────────
          # livenessProbe:  restart pod if app is stuck/deadlocked
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # readinessProbe: remove pod from LB if temporarily unavailable
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          env:
            - name: PORT
              value: "8000"