apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  namespace: cloudmart
  labels:
    app: order-service
    component: backend
    managed-by: jenkins

spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: order-service
        component: backend

    spec:
      containers:
        - name: order-service
          image: ${ECR_REGISTRY}/cloudmart-order-service:${IMAGE_TAG}
          ports:
            - containerPort: 8000 
              name: http

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5 
            periodSeconds: 5
            failureThreshold: 3

          env:
            - name: APP_ENV
              value: "production"
            - name: PORT
              value: "8000"
      terminationGracePeriodSeconds: 30